site_name: Engineering Notes
site_description: Structured engineering design notes and worked examples.
site_url: https://notes.edchamberlain.com/

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: deep orange
  features:
    - navigation.sections
    - navigation.top
    # - navigation.tabs
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

hooks:
  - hooks/nav_order.py
  - hooks/table_classes.py

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.details
  - footnotes
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/extra.css
  - stylesheets/tables.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

copyright: >
  © Edward Chamberlain. Content licensed under CC BY-NC 4.0.
